# Server Configuration
server.port=${PORT:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration (Defaults to local H2, auto-switches to MySQL on Render if environment variables are set)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ddms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Document Storage Configuration (Customizable via environment variable on Render)
storage.local.dir=${STORAGE_LOCAL_DIR:./document-storage}

# Active profile - switch to 'mysql' to enable MySQL database connection
# spring.profiles.active=mysql

