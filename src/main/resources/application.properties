# Server Configuration
server.port=${PORT:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration (Connected directly to Clever Cloud MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://bikpnmlohulrhlndvl13-mysql.services.clevercloud.com:3306/bikpnmlohulrhlndvl13?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:usskzwcrj7osfxxj}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1tu7wmrVJ2r7QslostLF}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Prevent startup crash if database is temporarily offline or DNS is propagating
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Limit pool size to match Clever Cloud's free tier limit (5 connections max)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Document Storage Configuration (Customizable via environment variable on Render)
storage.local.dir=${STORAGE_LOCAL_DIR:./document-storage}

