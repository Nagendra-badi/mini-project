<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Digital Document Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="mode-toggle" id="theme-toggle" title="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
    </div>

    <!-- Registration Container -->
    <div class="container my-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="auth-container glass-panel animate-fade-in" style="max-width: 600px;">
            <div class="brand-title">DDMS Cloud</div>
            <h3 class="text-center mb-4 fw-semibold" style="color: var(--text-primary);">Create An Account</h3>
            
            <!-- Error and Success Alerts -->
            <div class="alert alert-danger d-none" id="error-alert"></div>
            <div class="alert alert-success d-none" id="success-alert"></div>
            
            <form id="register-form">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="reg-username" class="form-label text-secondary small fw-semibold">Username</label>
                        <input type="text" class="form-control" id="reg-username" placeholder="Username" required>
                    </div>
                    <div class="col-md-6">
                        <label for="reg-email" class="form-label text-secondary small fw-semibold">Email Address</label>
                        <input type="email" class="form-control" id="reg-email" placeholder="Email" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="reg-fullname" class="form-label text-secondary small fw-semibold">Full Name</label>
                        <input type="text" class="form-control" id="reg-fullname" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="reg-phone" class="form-label text-secondary small fw-semibold">Phone Number</label>
                        <input type="text" class="form-control" id="reg-phone" placeholder="Phone" required>
                    </div>

                    <div class="col-md-6">
                        <label for="reg-password" class="form-label text-secondary small fw-semibold">Password</label>
                        <input type="password" class="form-control" id="reg-password" placeholder="Password" required>
                    </div>
                    <div class="col-md-6">
                        <label for="reg-confirm-password" class="form-label text-secondary small fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control" id="reg-confirm-password" placeholder="Confirm" required>
                    </div>

                    <div class="col-12">
                        <label for="reg-role" class="form-label text-secondary small fw-semibold">Account Role</label>
                        <select class="form-select" id="reg-role" required>
                            <option value="USER">Standard User</option>
                            <option value="ADMIN">Administrator</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fw-semibold shadow-sm mt-4">
                    Sign Up <i class="fa-solid fa-user-plus ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="text-secondary small mb-0">Already have an account? <a href="login.html" class="text-primary fw-semibold text-decoration-none">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAuthPages('register');
        });
    </script>
</body>
</html>
