<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Document Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="mode-toggle" id="theme-toggle" title="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
    </div>

    <!-- Login Container -->
    <div class="container my-auto py-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="auth-container glass-panel animate-fade-in">
            <div class="brand-title">DDMS Cloud</div>
            <h3 class="text-center mb-4 fw-semibold" style="color: var(--text-primary);">Account Sign In</h3>
            
            <!-- Error Alert -->
            <div class="alert alert-danger d-none" id="error-alert"></div>
            
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary small fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
                        <a href="login.html#" class="text-primary small text-decoration-none" id="forgot-password-link">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fw-semibold shadow-sm mb-3">
                    Sign In <i class="fa-solid fa-right-to-bracket ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="text-secondary small mb-0">Don't have an account? <a href="register.html" class="text-primary fw-semibold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>

    <!-- Simulated Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-panel p-3 border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" style="color: var(--text-primary);">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="forgot-password-form">
                    <div class="modal-body border-0">
                        <div class="alert alert-danger d-none" id="forgot-error-alert"></div>
                        <div class="alert alert-success d-none" id="forgot-success-alert"></div>
                        <div class="mb-3">
                            <label for="forgot-username" class="form-label small fw-semibold text-secondary">Username</label>
                            <input type="text" class="form-control" id="forgot-username" required>
                        </div>
                        <div class="mb-3">
                            <label for="forgot-email" class="form-label small fw-semibold text-secondary">Registered Email</label>
                            <input type="email" class="form-control" id="forgot-email" required>
                        </div>
                        <div class="mb-3">
                            <label for="forgot-new-password" class="form-label small fw-semibold text-secondary">New Password</label>
                            <input type="password" class="form-control" id="forgot-new-password" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Set page specific context
        document.addEventListener('DOMContentLoaded', () => {
            initAuthPages('login');
        });
    </script>
</body>
</html>
