# Server Configuration
server.port=${PORT:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration (Connected directly to Render Internal PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://dpg-d97kf9mtrd3s7397udp0-a:5432/ddms}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ddms_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PxtZ5axo4td6zQTcb1DUo0NxqNgPm7zf}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Prevent startup crash if database is temporarily offline or DNS is propagating
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Document Storage Configuration (Customizable via environment variable on Render)
storage.local.dir=${STORAGE_LOCAL_DIR:./document-storage}

